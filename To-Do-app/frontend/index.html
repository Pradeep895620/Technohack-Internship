<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Stack Todo Application</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-tasks"></i> Todo List</h1>
            <p>Manage your tasks efficiently</p>
        </header>

        <main>
            <!-- Add Todo Form -->
            <section class="add-todo-section">
                <h2>Add New Task</h2>
                <form id="todoForm" class="todo-form">
                    <div class="form-group">
                        <label for="title">Title:</label>
                        <input 
                            type="text" 
                            id="title" 
                            name="title" 
                            placeholder="Enter task title" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="description">Description:</label>
                        <textarea 
                            id="description" 
                            name="description" 
                            placeholder="Enter task description (optional)"
                            rows="3"
                        ></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Todo
                    </button>
                </form>
            </section>

            <!-- Todo List -->
            <section class="todo-list-section">
                <div class="section-header">
                    <h2>Your Tasks</h2>
                    <button id="deleteAllBtn" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Delete All
                    </button>
                </div>
                
                <!-- Loading Indicator -->
                <div id="loading" class="loading hidden">
                    <i class="fas fa-spinner fa-spin"></i> Loading...
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="error-message hidden"></div>

                <!-- Todo Items -->
                <div id="todoContainer" class="todo-container">
                    <!-- Todos will be dynamically added here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Todo Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Task</h3>
                <span class="close">&times;</span>
            </div>
            <form id="editForm" class="modal-form">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editTitle">Title:</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label for="editDescription">Description:</label>
                    <textarea id="editDescription" rows="3"></textarea>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="editCompleted">
                        Completed
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">Update Todo</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
